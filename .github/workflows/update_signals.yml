name: Update Signals Daily

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Generate signals
        run: python generate_signals.py

      - name: Commit & push signals.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json
          git diff --cached --quiet || git commit -m "chore: update signals $(date -u +%Y-%m-%d)"
          git push
